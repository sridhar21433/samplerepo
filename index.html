<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My S3 Static Website</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f4f4;
            text-align: center;
        }

        header {
            background: #232f3e;
            color: white;
            padding: 20px;
        }

        .container {
            margin: 50px auto;
            max-width: 800px;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        button {
            background: #ff9900;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #e68a00;
        }

        footer {
            margin-top: 50px;
            background: #232f3e;
            color: white;
            padding: 15px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Welcome to My AWS S3 Static Website</h1>
    </header>

    <div class="container">
        <h2>Hello World!</h2>
        <p>This website is hosted using Amazon S3 Static Website Hosting.</p>

        <button onclick="showMessage()">Click Me</button>
        <p id="msg"></p>
    </div>

    <footer>
        <p>Hosted on AWS S3</p>
    </footer>

    <script>
        function showMessage() {
            document.getElementById("msg").innerText =
                "Congratulations! Your S3 static website is working.";
        }
    </script>

</body>
</html>
